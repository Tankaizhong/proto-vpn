<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Proto Composer — 协议组合可视化配置器</title>
<link rel="stylesheet" href="vendor/pico.min.css">
<link rel="stylesheet" href="css/composer.css">
</head>
<body>

<header class="container">
  <hgroup>
    <h1>Proto Composer</h1>
    <p>选择非冲突的协议 + 传输 + TLS + 混淆组合；右侧实时生成 sing-box 入站配置</p>
  </hgroup>
</header>

<main class="container grid">
  <!-- 组合选择 -->
  <article x-data x-init="$store.composer.init()">
    <header><h2>组合选择</h2></header>

    <template x-for="(group, key) in $store.composer.groups" :key="key">
      <section class="opt-group">
        <h3>
          <span x-text="group.title"></span>
          <small x-text="group.multi ? '多选' : '单选'"></small>
        </h3>
        <div class="opt-grid">
          <template x-for="opt in group.options" :key="opt.id">
            <button
              type="button"
              class="opt"
              :class="{
                active: $store.composer.isSelected(key, opt.id),
                disabled: !$store.composer.canSelect(key, opt.id),
              }"
              :disabled="!$store.composer.canSelect(key, opt.id)"
              :aria-pressed="$store.composer.isSelected(key, opt.id)"
              @click="$store.composer.toggle(key, opt.id)"
              :title="$store.composer.disabledReason(key, opt.id) || opt.desc">
              <strong x-text="opt.label"></strong>
              <small x-text="opt.desc"></small>
            </button>
          </template>
        </div>
      </section>
    </template>

    <!-- 5. 字段 (Fields) — 在 TLS 1.3 / Reality / WS / gRPC 传输时显示 -->
    <section class="opt-group" x-show="$store.composer.state.tls === 'tls' || $store.composer.state.tls === 'reality' || $store.composer.state.transport === 'ws' || $store.composer.state.transport === 'grpc'">
      <h3>5. 字段 (Fields) <small>可选</small></h3>
      <div class="field-row" x-show="$store.composer.state.tls === 'tls'">
        <label for="tls_server_name">TLS server_name</label>
        <input id="tls_server_name" type="text" placeholder="vpn.example.com"
               x-model="$store.composer.state.fields.tls_server_name">
      </div>
      <div class="field-row" x-show="$store.composer.state.tls === 'reality'">
        <label for="reality_handshake_server">Reality 借站域名</label>
        <input id="reality_handshake_server" type="text" placeholder="www.microsoft.com"
               x-model="$store.composer.state.fields.reality_handshake_server">
      </div>
      <div class="field-row" x-show="$store.composer.state.tls === 'reality'">
        <label for="reality_handshake_port">Reality 握手端口</label>
        <input id="reality_handshake_port" type="number" min="1" max="65535" placeholder="443"
               x-model.number="$store.composer.state.fields.reality_handshake_port">
      </div>
      <div class="field-row" x-show="$store.composer.state.transport === 'ws'">
        <label for="ws_path">WS path</label>
        <input id="ws_path" type="text" placeholder="/ray"
               x-model="$store.composer.state.fields.ws_path">
      </div>
      <div class="field-row" x-show="$store.composer.state.transport === 'grpc'">
        <label for="grpc_service_name">gRPC service_name</label>
        <input id="grpc_service_name" type="text" placeholder="proto"
               x-model="$store.composer.state.fields.grpc_service_name">
      </div>
    </section>
  </article>

  <!-- 结果 + 后端控制 -->
  <article x-data="lab">
    <header><h2>结果</h2></header>

    <!-- 状态提示 -->
    <template x-if="$store.composer.missing.length">
      <p class="status warn">
        ⚠ 还需选择：<span x-text="$store.composer.missing.join(' / ')"></span>
      </p>
    </template>
    <template x-if="!$store.composer.missing.length && $store.composer.conflicts.length">
      <div class="status err">
        <strong>组合存在冲突：</strong>
        <ul>
          <template x-for="c in $store.composer.conflicts" :key="c">
            <li x-text="c"></li>
          </template>
        </ul>
      </div>
    </template>
    <template x-if="$store.composer.isReady">
      <p class="status ok">
        ✓ 组合无冲突：<code x-text="$store.composer.fingerprint"></code>
      </p>
    </template>

    <!-- 配置预览 -->
    <h3>sing-box 入站配置</h3>
    <pre x-html="$store.composer.coloredJSON" class="json"></pre>

    <!-- 静态按钮 -->
    <div role="group">
      <button type="button" class="secondary"
              @click="$store.composer.copyJSON($el)"
              :disabled="!$store.composer.isReady">复制 JSON</button>
      <button type="button" class="secondary outline"
              @click="$store.composer.reset()">重置选择</button>
    </div>

    <!-- lab 按钮 -->
    <div role="group" class="lab-row">
      <button type="button"
              @click="start()"
              :disabled="running || !$store.composer.isReady">▶ 生成 pcap</button>
      <button type="button" class="secondary"
              @click="stop()"
              :disabled="!running">■ 停止</button>
      <a class="download" :href="pcapUrl" :hidden="!pcapUrl" download>⬇ 下载 pcap</a>
      <span class="lab-status" x-text="statusText"></span>
    </div>

    <pre class="lab-log" x-text="logText" :hidden="!logText"></pre>
  </article>
</main>

<!-- 顺序很关键：业务 JS 必须先 load 注册 alpine:init 监听器，然后 Alpine 加载并 fire 事件 -->
<script src="js/lab-client.js" defer></script>
<script src="js/composer.js" defer></script>

<script src="vendor/alpinejs.min.js" defer></script>

</body>
</html>
